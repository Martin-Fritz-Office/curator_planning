<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Empfehlungen des Stadtrechnungshofs - Semantische Suche</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .container {
            width: 100%;
            max-width: 900px;
            background: white;
            border-radius: 12px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
            overflow: hidden;
        }

        .header {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 40px 30px;
            text-align: center;
        }

        .header h1 {
            font-size: 28px;
            margin-bottom: 10px;
            font-weight: 700;
        }

        .header p {
            font-size: 14px;
            opacity: 0.95;
            max-width: 500px;
            margin: 0 auto;
        }

        .content {
            padding: 40px 30px;
        }

        .search-section {
            margin-bottom: 40px;
        }

        .expertise-selector {
            margin-bottom: 25px;
            padding: 16px;
            background: #f5f7fa;
            border-radius: 8px;
            border: 1px solid #e0e0e0;
        }

        .expertise-selector label {
            display: block;
            font-weight: 600;
            color: #333;
            margin-bottom: 12px;
            font-size: 14px;
        }

        .expertise-options {
            display: flex;
            gap: 20px;
        }

        .radio-label {
            display: flex;
            align-items: center;
            gap: 8px;
            cursor: pointer;
            font-weight: 400;
            color: #555;
        }

        .radio-label input[type="radio"] {
            cursor: pointer;
            accent-color: #667eea;
        }

        .radio-label span {
            font-size: 14px;
        }

        .search-box {
            display: flex;
            gap: 10px;
            margin-bottom: 15px;
        }

        #question {
            flex: 1;
            padding: 14px 16px;
            font-size: 16px;
            border: 2px solid #e0e0e0;
            border-radius: 8px;
            font-family: inherit;
            transition: border-color 0.3s ease;
        }

        #question:focus {
            outline: none;
            border-color: #667eea;
        }

        #question::placeholder {
            color: #999;
        }

        button {
            padding: 14px 30px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: transform 0.2s ease, box-shadow 0.2s ease;
        }

        button:hover:not(:disabled) {
            transform: translateY(-2px);
            box-shadow: 0 10px 20px rgba(102, 126, 234, 0.3);
        }

        button:disabled {
            opacity: 0.6;
            cursor: not-allowed;
        }

        .loading {
            display: none;
            text-align: center;
            padding: 30px;
            color: #667eea;
        }

        .spinner {
            display: inline-block;
            width: 40px;
            height: 40px;
            border: 4px solid #e0e0e0;
            border-top-color: #667eea;
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        .loading.show {
            display: block;
        }

        .error {
            background: #fee;
            color: #c33;
            padding: 16px;
            border-radius: 8px;
            margin-bottom: 20px;
            border-left: 4px solid #c33;
            display: none;
        }

        .error.show {
            display: block;
        }

        .result-section {
            display: none;
        }

        .result-section.show {
            display: block;
        }

        .summary-box {
            background: #f0f4ff;
            border-left: 4px solid #667eea;
            padding: 16px;
            border-radius: 8px;
            margin-bottom: 20px;
            line-height: 1.5;
            color: #333;
        }

        .summary-box h3 {
            color: #667eea;
            font-size: 14px;
            font-weight: 600;
            margin-bottom: 8px;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .summary-box p {
            margin: 0;
            font-size: 15px;
            color: #444;
        }

        .answer-box {
            background: #f8f9ff;
            border-left: 4px solid #667eea;
            padding: 20px;
            border-radius: 8px;
            margin-bottom: 30px;
            line-height: 1.6;
            color: #333;
        }

        .answer-box h2 {
            color: #667eea;
            font-size: 18px;
            margin-bottom: 12px;
        }

        .answer-box p {
            margin: 0;
            white-space: pre-wrap;
            word-wrap: break-word;
        }

        .sources-section {
            margin-top: 30px;
        }

        .sources-section h3 {
            font-size: 16px;
            color: #333;
            margin-bottom: 15px;
            padding-bottom: 10px;
            border-bottom: 2px solid #e0e0e0;
        }

        .source-card {
            background: #f5f7fa;
            border: 1px solid #e0e0e0;
            border-radius: 8px;
            padding: 16px;
            margin-bottom: 12px;
            transition: all 0.2s ease;
        }

        .source-card:hover {
            background: #eef1f8;
            border-color: #667eea;
            box-shadow: 0 4px 12px rgba(102, 126, 234, 0.1);
        }

        .source-title {
            font-weight: 600;
            color: #333;
            margin-bottom: 8px;
            line-height: 1.4;
        }

        .source-meta {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 12px;
            font-size: 13px;
            color: #666;
        }

        .source-meta-item {
            display: flex;
            flex-direction: column;
        }

        .source-meta-label {
            color: #999;
            font-weight: 500;
            margin-bottom: 2px;
        }

        .source-meta-value {
            color: #333;
        }

        .similarity-badge {
            display: inline-block;
            background: #e0e7ff;
            color: #667eea;
            padding: 4px 10px;
            border-radius: 12px;
            font-size: 12px;
            font-weight: 600;
            margin-top: 8px;
        }

        .back-link {
            display: inline-block;
            color: white;
            text-decoration: none;
            font-size: 14px;
            margin-bottom: 15px;
            padding: 8px 0;
            opacity: 0.9;
            transition: opacity 0.3s ease;
        }

        .back-link:hover {
            opacity: 1;
            text-decoration: underline;
        }

        @media (max-width: 600px) {
            .header {
                padding: 30px 20px;
            }

            .header h1 {
                font-size: 22px;
            }

            .content {
                padding: 20px;
            }

            .search-box {
                flex-direction: column;
            }

            button {
                width: 100%;
            }

            .source-meta {
                grid-template-columns: 1fr;
            }

            .answer-box {
                padding: 16px;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <a href="https://artbackstage.info/index_organisation.php" class="back-link">← Zurück zu artbackstage | Organisation</a>
            <h1>🔍 Prüfungsempfehlungen Suche</h1>
            <p>Durchsuche 22.000 Empfehlungen des Wiener Stadtrechnungshofs seit 2017</p>
        </div>

        <div class="content">
            <div class="search-section">
                <div class="expertise-selector">
                    <label for="expertise">Dein Wissenslevel:</label>
                    <div class="expertise-options">
                        <label class="radio-label">
                            <input type="radio" name="expertise" value="beginner" checked>
                            <span>Ich weiß nicht viel über dieses Thema</span>
                        </label>
                        <label class="radio-label">
                            <input type="radio" name="expertise" value="expert">
                            <span>Ich bin ein Experte</span>
                        </label>
                    </div>
                </div>

                <div class="search-box">
                    <input
                        type="text"
                        id="question"
                        placeholder="Stelle deine Frage ein... (z.B. 'Was sollten wir bei der Mitarbeiterverwaltung überprüfen?')"
                        autocomplete="off"
                    >
                    <button id="searchBtn" onclick="search()">Suchen</button>
                </div>
            </div>

            <div class="error" id="error"></div>
            <div class="loading" id="loading">
                <div class="spinner"></div>
                <p style="margin-top: 15px;">Suche läuft...</p>
            </div>

            <div class="result-section" id="result">
                <div class="summary-box" id="summaryBox">
                    <h3>📝 Kurzübersicht</h3>
                    <p id="summary"></p>
                </div>

                <div class="answer-box">
                    <h2>Detaillierte Antwort</h2>
                    <p id="answer"></p>
                </div>

                <div class="sources-section">
                    <h3>📚 Verwendete Empfehlungen</h3>
                    <div id="sources"></div>
                </div>
            </div>
        </div>
    </div>

    <script>
        const question = document.getElementById('question');
        const searchBtn = document.getElementById('searchBtn');
        const loading = document.getElementById('loading');
        const error = document.getElementById('error');
        const result = document.getElementById('result');
        const summaryEl = document.getElementById('summary');
        const answerEl = document.getElementById('answer');
        const sourcesEl = document.getElementById('sources');

        function getExpertiseLevel() {
            const selected = document.querySelector('input[name="expertise"]:checked');
            return selected ? selected.value : 'beginner';
        }

        function showError(msg) {
            error.textContent = msg;
            error.classList.add('show');
            result.classList.remove('show');
            setTimeout(() => error.classList.remove('show'), 5000);
        }

        function hideError() {
            error.classList.remove('show');
        }

        async function search() {
            const q = question.value.trim();
            if (!q) {
                showError('Bitte geben Sie eine Frage ein');
                return;
            }

            hideError();
            loading.classList.add('show');
            result.classList.remove('show');
            searchBtn.disabled = true;

            try {
                const response = await fetch('/ask', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify({
                        question: q,
                        expertise_level: getExpertiseLevel()
                    })
                });

                if (!response.ok) {
                    const errorData = await response.json();
                    throw new Error(errorData.error || 'Fehler bei der Suche');
                }

                const data = await response.json();
                displayResults(data);
            } catch (err) {
                showError('Fehler: ' + err.message);
            } finally {
                loading.classList.remove('show');
                searchBtn.disabled = false;
            }
        }

        function displayResults(data) {
            summaryEl.textContent = data.summary || data.answer;
            answerEl.textContent = data.answer;

            sourcesEl.innerHTML = '';
            if (data.sources && data.sources.length > 0) {
                data.sources.forEach((source, index) => {
                    const card = document.createElement('div');
                    card.className = 'source-card';
                    const searchLinkHtml = source.search_link
                        ? `<a href="${source.search_link}" target="_blank" rel="noopener noreferrer" style="color:#667eea;font-size:13px;">🔍 Google-Suche: ${source.quelldatei}</a>`
                        : (source.quelldatei ? `<span style="font-size:13px;color:#555;">📄 ${source.quelldatei}</span>` : '');

                    card.innerHTML = `
                        <div class="source-title">${index + 1}. ${source.empfehlung}</div>
                        <div class="source-meta">
                            <div class="source-meta-item">
                                <span class="source-meta-label">Quelldatei</span>
                                <span class="source-meta-value">${source.quelldatei || 'N/A'}</span>
                            </div>
                            <div class="source-meta-item">
                                <span class="source-meta-label">Adressiert an</span>
                                <span class="source-meta-value">${source.adressiert_an}</span>
                            </div>
                        </div>
                        ${source.search_link ? `<a href="${source.search_link}" target="_blank" style="color: #667eea; text-decoration: none; font-size: 13px;">🔗 In Google suchen</a>` : ''}
                        <span class="similarity-badge">Ähnlichkeit: ${(source.similarity * 100).toFixed(1)}%</span>
                        ${source.search_link ? `<div style="margin-top:10px;"><a href="${source.search_link}" target="_blank" rel="noopener noreferrer" style="color:#667eea;font-size:13px;text-decoration:none;">🔍 Suche nach Quelldatei</a></div>` : ''}
                    `;
                    sourcesEl.appendChild(card);
                });
            }

            result.classList.add('show');
        }

        // Allow Enter key to search
        question.addEventListener('keypress', (e) => {
            if (e.key === 'Enter') {
                search();
            }
        });

        // Focus input on load
        question.focus();
    </script>
</body>
</html>
