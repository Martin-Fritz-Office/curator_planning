<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Empfehlungen des Stadtrechnungshofs - Semantische Suche</title>
    <link rel="stylesheet" href="/static/style.css">
</head>
<body class="search-interface">
    <div class="page search-page">
        <div class="header">
            <div>
                <h1>🔍 Lerne aus Empfehlungen des Wiener Stadtrechnungshofs!</h1>
                <p>Durchsuche und analysiere 22.000 Empfehlungen seit 2017</p>
            </div>
            <div class="header-actions">
                <a href="https://artbackstage.info/index_organisation.php" class="back-link">← Zurück</a>
            </div>
        </div>

        <div class="container">
            <div class="search-section">
                <div class="expertise-selector">
                    <label for="expertise">Dein Wissenslevel:</label>
                    <div class="expertise-options">
                        <label class="radio-label">
                            <input type="radio" name="expertise" value="beginner" checked>
                            <span>Ich weiß nicht viel über dieses Thema</span>
                        </label>
                        <label class="radio-label">
                            <input type="radio" name="expertise" value="expert">
                            <span>Ich bin ein Experte</span>
                        </label>
                    </div>
                </div>

                <div class="search-box">
                    <input
                        type="text"
                        id="question"
                        placeholder="Stelle deine Frage ein... (z.B. 'Was sollten wir bei der Mitarbeiterverwaltung überprüfen?')"
                        autocomplete="off"
                    >
                    <button id="searchBtn" onclick="search()">Suchen</button>
                </div>
            </div>

            <div class="error" id="error"></div>
            <div class="loading" id="loading">
                <div class="spinner"></div>
                <p style="margin-top: 15px;">Suche läuft...</p>
            </div>

            <div class="result-section" id="result">
                <div class="summary-box" id="summaryBox">
                    <h3>📝 Kurzübersicht</h3>
                    <p id="summary"></p>
                </div>

                <div class="answer-box">
                    <h2>Detaillierte Antwort</h2>
                    <p id="answer"></p>
                </div>

                <div class="sources-section">
                    <h3>📚 Verwendete Empfehlungen</h3>
                    <div id="sources"></div>
                </div>
            </div>
        </div>
    </div>

    <script>
        const question = document.getElementById('question');
        const searchBtn = document.getElementById('searchBtn');
        const loading = document.getElementById('loading');
        const error = document.getElementById('error');
        const result = document.getElementById('result');
        const summaryEl = document.getElementById('summary');
        const answerEl = document.getElementById('answer');
        const sourcesEl = document.getElementById('sources');

        function getExpertiseLevel() {
            const selected = document.querySelector('input[name="expertise"]:checked');
            return selected ? selected.value : 'beginner';
        }

        function showError(msg) {
            error.textContent = msg;
            error.classList.add('show');
            result.classList.remove('show');
            setTimeout(() => error.classList.remove('show'), 5000);
        }

        function hideError() {
            error.classList.remove('show');
        }

        async function search() {
            const q = question.value.trim();
            if (!q) {
                showError('Bitte geben Sie eine Frage ein');
                return;
            }

            hideError();
            loading.classList.add('show');
            result.classList.remove('show');
            searchBtn.disabled = true;

            try {
                const response = await fetch('/ask', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify({
                        question: q,
                        expertise_level: getExpertiseLevel()
                    })
                });

                if (!response.ok) {
                    const errorData = await response.json();
                    throw new Error(errorData.error || 'Fehler bei der Suche');
                }

                const data = await response.json();
                displayResults(data);
            } catch (err) {
                showError('Fehler: ' + err.message);
            } finally {
                loading.classList.remove('show');
                searchBtn.disabled = false;
            }
        }

        function displayResults(data) {
            summaryEl.textContent = data.summary || data.answer;
            answerEl.textContent = data.answer;

            sourcesEl.innerHTML = '';
            if (data.sources && data.sources.length > 0) {
                data.sources.forEach((source, index) => {
                    const card = document.createElement('div');
                    card.className = 'source-card';
                    const searchLinkHtml = source.search_link
                        ? `<a href="${source.search_link}" target="_blank" rel="noopener noreferrer" style="color:#667eea;font-size:13px;">🔍 Google-Suche: ${source.quelldatei}</a>`
                        : (source.quelldatei ? `<span style="font-size:13px;color:#555;">📄 ${source.quelldatei}</span>` : '');

                    card.innerHTML = `
                        <div class="source-title">${index + 1}. ${source.empfehlung}</div>
                        <div class="source-meta">
                            <div class="source-meta-item">
                                <span class="source-meta-label">Quelldatei</span>
                                <span class="source-meta-value">${source.quelldatei || 'N/A'}</span>
                            </div>
                            <div class="source-meta-item">
                                <span class="source-meta-label">Adressiert an</span>
                                <span class="source-meta-value">${source.adressiert_an}</span>
                            </div>
                        </div>
                        ${searchLinkHtml}
                        <span class="similarity-badge">Ähnlichkeit: ${(source.similarity * 100).toFixed(1)}%</span>
                    `;
                    sourcesEl.appendChild(card);
                });
            }

            result.classList.add('show');
        }

        // Allow Enter key to search
        question.addEventListener('keypress', (e) => {
            if (e.key === 'Enter') {
                search();
            }
        });

        // Focus input on load
        question.focus();
    </script>
</body>
</html>
