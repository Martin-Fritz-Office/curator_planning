<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Empfehlungen des Stadtrechnungshofs - Semantische Suche</title>
    <link rel="stylesheet" href="/static/style.css">
</head>
<body class="search-interface">
    <div class="page search-page">
        <div class="header">
            <div>
                <h1>🔍 Lerne aus Empfehlungen des Wiener Stadtrechnungshofs und des Bundesrechnungshofs!</h1>
                <p>Durchsuche und analysiere mehr als 20.000 Empfehlungen seit 2017</p>
            </div>
            <div class="header-actions">
                <a href="https://artbackstage.info/index_organisation.php" class="back-link">← Zurück</a>
            </div>
        </div>

        <div class="container">
            <div class="search-section">
                <div class="expertise-selector">
                    <label for="expertise">Dein Wissenslevel:</label>
                    <div class="expertise-options">
                        <label class="radio-label">
                            <input type="radio" name="expertise" value="beginner" checked>
                            <span>Ich weiß nicht viel über dieses Thema</span>
                        </label>
                        <label class="radio-label">
                            <input type="radio" name="expertise" value="expert">
                            <span>Ich bin ein Experte</span>
                        </label>
                    </div>
                </div>

                <div class="search-source-selector">
                    <label for="search-source">Datenquelle:</label>
                    <div class="search-source-options">
                        <label class="radio-label">
                            <input type="radio" name="search-source" value="strh" checked>
                            <span>Stadtrechnungshof (STRH)</span>
                        </label>
                        <label class="radio-label">
                            <input type="radio" name="search-source" value="brh">
                            <span>Bundesrechnungshof (BRH)</span>
                        </label>
                        <label class="radio-label">
                            <input type="radio" name="search-source" value="all">
                            <span>Beide Quellen</span>
                        </label>
                    </div>
                </div>

                <div class="search-box">
                    <input
                        type="text"
                        id="question"
                        placeholder="Stelle deine Frage ein... (z.B. 'Was sollten wir bei der Mitarbeiterverwaltung überprüfen?')"
                        autocomplete="off"
                    >
                    <button id="searchBtn" onclick="search()">Suchen</button>
                </div>
            </div>

            <div class="error" id="error"></div>
            <div class="loading" id="loading">
                <div class="spinner"></div>
                <p style="margin-top: 15px;">Suche läuft...</p>
            </div>

            <div class="result-section" id="result">
                <div class="answer-box">
                    <h2>💡 Zentrale Aussage</h2>
                    <p id="zentraleAussage"></p>
                </div>

                <div class="summary-box" id="summaryBox">
                    <h3>📝 Kurzübersicht</h3>
                    <p id="summary"></p>
                </div>

                <div class="sources-section">
                    <h3>📚 Verwendete Empfehlungen</h3>
                    <div id="sources"></div>
                </div>
            </div>

            <div class="themes-section" id="themesSection" style="display: none;">
                <h2>🎯 Empfohlene Themen</h2>
                <div class="themes-loading" id="themesLoading">
                    <div class="spinner"></div>
                    <p>Lade empfohlene Themen...</p>
                </div>
                <div id="themesContainer" class="themes-grid"></div>
            </div>
        </div>
    </div>

    <script>
        const question = document.getElementById('question');
        const searchBtn = document.getElementById('searchBtn');
        const loading = document.getElementById('loading');
        const error = document.getElementById('error');
        const result = document.getElementById('result');
        const summaryEl = document.getElementById('summary');
        const zentraleAussageEl = document.getElementById('zentraleAussage');
        const sourcesEl = document.getElementById('sources');
        const themesSection = document.getElementById('themesSection');
        const themesContainer = document.getElementById('themesContainer');
        const themesLoading = document.getElementById('themesLoading');

        function getExpertiseLevel() {
            const selected = document.querySelector('input[name="expertise"]:checked');
            return selected ? selected.value : 'beginner';
        }

        function getSearchSource() {
            const selected = document.querySelector('input[name="search-source"]:checked');
            return selected ? selected.value : 'strh';
        }

        function showError(msg) {
            error.textContent = msg;
            error.classList.add('show');
            result.classList.remove('show');
            setTimeout(() => error.classList.remove('show'), 5000);
        }

        function hideError() {
            error.classList.remove('show');
        }

        async function search() {
            const q = question.value.trim();
            if (!q) {
                showError('Bitte geben Sie eine Frage ein');
                return;
            }

            hideError();
            loading.classList.add('show');
            result.classList.remove('show');
            searchBtn.disabled = true;

            try {
                const response = await fetch('/ask', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify({
                        question: q,
                        expertise_level: getExpertiseLevel(),
                        search_source: getSearchSource()
                    })
                });

                if (!response.ok) {
                    const errorData = await response.json();
                    throw new Error(errorData.error || 'Fehler bei der Suche');
                }

                const data = await response.json();
                displayResults(data);
            } catch (err) {
                showError('Fehler: ' + err.message);
            } finally {
                loading.classList.remove('show');
                searchBtn.disabled = false;
            }
        }

        function displayResults(data) {
            summaryEl.textContent = data.summary || '';
            zentraleAussageEl.textContent = data.zentrale_aussage || '';

            sourcesEl.innerHTML = '';
            if (data.sources && data.sources.length > 0) {
                data.sources.forEach((source, index) => {
                    const card = document.createElement('div');
                    card.className = 'source-card';
                    const searchLinkHtml = source.search_link
                        ? `<a href="${source.search_link}" target="_blank" rel="noopener noreferrer" style="color:#667eea;font-size:13px;">🔍 Google-Suche: ${source.quelldatei}</a>`
                        : (source.quelldatei ? `<span style="font-size:13px;color:#555;">📄 ${source.quelldatei}</span>` : '');

                    card.innerHTML = `
                        <div class="source-title">${index + 1}. ${source.empfehlung}</div>
                        <div class="source-meta">
                            <div class="source-meta-item">
                                <span class="source-meta-label">Quelldatei</span>
                                <span class="source-meta-value">${source.quelldatei || 'N/A'}</span>
                            </div>
                            <div class="source-meta-item">
                                <span class="source-meta-label">Adressiert an</span>
                                <span class="source-meta-value">${source.adressiert_an}</span>
                            </div>
                        </div>
                        ${searchLinkHtml}
                        <span class="similarity-badge">Ähnlichkeit: ${(source.similarity * 100).toFixed(1)}%</span>
                    `;
                    sourcesEl.appendChild(card);
                });
            }

            result.classList.add('show');
        }

        async function loadThemes() {
            try {
                const source = getSearchSource();
                const response = await fetch(`/themes?source=${source}`);

                if (!response.ok) {
                    throw new Error('Fehler beim Laden der Themen');
                }

                const data = await response.json();
                themesSection.style.display = 'block';
                displayThemes(data.themes);
            } catch (err) {
                console.error('Error loading themes:', err);
                themesSection.style.display = 'none';
            } finally {
                themesLoading.style.display = 'none';
            }
        }

        function displayThemes(themes) {
            themesContainer.innerHTML = '';

            themes.slice(0, 12).forEach((theme) => {
                const card = document.createElement('div');
                card.className = 'theme-card';
                card.innerHTML = `
                    <div class="theme-card-header">
                        <h3>${theme.theme}</h3>
                        <span class="theme-frequency">${theme.frequency}</span>
                    </div>
                    <p class="theme-description">${theme.description}</p>
                    <button class="theme-expand-btn" data-theme-id="${theme.id}">
                        Fragen & Checkliste anzeigen
                    </button>
                    <div class="theme-questions-container" id="questions-${theme.id}" style="display: none;">
                        <div class="theme-loading">
                            <div class="spinner"></div>
                        </div>
                    </div>
                `;

                card.querySelector('.theme-expand-btn').addEventListener('click', async (e) => {
                    e.preventDefault();
                    const container = document.getElementById(`questions-${theme.id}`);
                    const btn = e.target;

                    if (container.style.display === 'none') {
                        container.style.display = 'block';
                        if (!container.dataset.loaded) {
                            await loadThemeQuestions(theme, container);
                        }
                        btn.textContent = 'Verbergen';
                    } else {
                        container.style.display = 'none';
                        btn.textContent = 'Fragen & Checkliste anzeigen';
                    }
                });

                themesContainer.appendChild(card);
            });
        }

        async function loadThemeQuestions(theme, container) {
            try {
                const response = await fetch('/theme-questions', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify({
                        theme_name: theme.theme,
                        theme_description: theme.description,
                        expertise_level: getExpertiseLevel()
                    })
                });

                if (!response.ok) {
                    throw new Error('Fehler beim Laden der Fragen');
                }

                const data = await response.json();
                displayThemeContent(container, data.content);
                container.dataset.loaded = 'true';
            } catch (err) {
                console.error('Error loading theme questions:', err);
                container.innerHTML = '<p style="color:red;">Fehler beim Laden der Fragen</p>';
            }
        }

        function displayThemeContent(container, content) {
            const questionsHtml = content.questions.map(q =>
                `<li class="theme-question" onclick="searchQuestion('${q.replace(/'/g, "\\'")}')">
                    ${q}
                </li>`
            ).join('');

            const checklistHtml = content.checklist.map(item =>
                `<li class="theme-checklist-item">
                    <input type="checkbox" id="check-${Math.random()}">
                    <label>${item}</label>
                </li>`
            ).join('');

            container.innerHTML = `
                <div class="theme-content">
                    <div class="theme-questions">
                        <h4>💭 Häufig gestellte Fragen</h4>
                        <ul>${questionsHtml}</ul>
                    </div>
                    <div class="theme-checklist">
                        <h4>✓ Checkliste</h4>
                        <ul>${checklistHtml}</ul>
                    </div>
                </div>
            `;
        }

        function searchQuestion(q) {
            question.value = q;
            question.focus();
            search();
        }

        // Allow Enter key to search
        question.addEventListener('keypress', (e) => {
            if (e.key === 'Enter') {
                search();
            }
        });

        // Load themes on page load
        document.addEventListener('DOMContentLoaded', () => {
            question.focus();
            loadThemes();
        });

        // Reload themes when search source changes
        document.querySelectorAll('input[name="search-source"]').forEach(radio => {
            radio.addEventListener('change', () => {
                themesLoading.style.display = 'flex';
                loadThemes();
            });
        });
    </script>
</body>
</html>
